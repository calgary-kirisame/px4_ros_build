---
# Flash a CM5 eMMC via rpiboot + rpi-imager with per-device cloud-init.
#
# Usage:
#   cd provision
#   ansible-playbook playbooks/flash.yml \
#     -e 'hostname=bigpi5 device=/dev/disk4 image=px4-companion-cm5-20260415.img.xz'

- name: Flash drone image
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    drone_hostname: "{{ hostname }}"

  pre_tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - hostname is defined
          - device is defined
          - image is defined
        fail_msg: >
          Required: -e 'hostname=N device=/dev/diskX image=path/to/image.img.xz'

  tasks:
    - name: Generate cloud-init user-data
      ansible.builtin.template:
        src: ../templates/user-data.yaml.j2
        dest: "/tmp/cloud-init-{{ drone_hostname }}-user-data"
        mode: "0644"

    - name: Generate cloud-init network-config
      ansible.builtin.template:
        src: ../templates/network-config.yaml.j2
        dest: "/tmp/cloud-init-{{ drone_hostname }}-network-config"
        mode: "0644"

    - name: Confirm flash
      ansible.builtin.pause:
        prompt: "Flash {{ image }} to {{ device }} for {{ drone_hostname }}? (yes/no)"
      register: confirm

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: Aborted
      when: confirm.user_input != "yes"

    - name: Flash image
      ansible.builtin.command:
        cmd: >
          rpi-imager --cli
          --cloudinit-userdata /tmp/cloud-init-{{ drone_hostname }}-user-data
          --cloudinit-networkconfig /tmp/cloud-init-{{ drone_hostname }}-network-config
          {{ image }} {{ device }}

    - name: Clean up temp files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/cloud-init-{{ drone_hostname }}-user-data"
        - "/tmp/cloud-init-{{ drone_hostname }}-network-config"

    - name: Done
      ansible.builtin.debug:
        msg: >
          {{ drone_hostname }} flashed. Remove nRPIBOOT jumper, power on,
          then ssh maav@{{ drone_hostname }}
