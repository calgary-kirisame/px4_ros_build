name: Build PX4 Companion Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PIOS_MANIFEST_URL: https://downloads.raspberrypi.com/os_list_imagingutility_v4.json
  XRCE_DDS_VERSION: v2.4.3

jobs:
  ros-base:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@v6

      - name: Restore cached tarball
        id: tarball
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ros-jazzy-base-pios-arm64.tar.gz
          key: ros-base-tarball-${{ hashFiles('repos/jazzy-pios-trixie.repos', 'scripts/build-ros.sh', 'scripts/install-build-deps.sh') }}

      - name: Install build dependencies
        if: steps.tarball.outputs.cache-hit != 'true'
        run: scripts/install-build-deps.sh

      - uses: hendrikmuhs/ccache-action@v1.2
        if: steps.tarball.outputs.cache-hit != 'true'
        with:
          key: ros-base-${{ hashFiles('repos/jazzy-pios-trixie.repos') }}

      - name: Build ROS 2 Jazzy
        if: steps.tarball.outputs.cache-hit != 'true'
        run: scripts/build-ros.sh

      - name: Save tarball cache
        if: steps.tarball.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/ros-jazzy-base-pios-arm64.tar.gz
          key: ros-base-tarball-${{ hashFiles('repos/jazzy-pios-trixie.repos', 'scripts/build-ros.sh', 'scripts/install-build-deps.sh') }}

      - uses: actions/upload-artifact@v7
        with:
          name: ros-jazzy-base
          path: /tmp/ros-jazzy-base-pios-arm64.tar.gz
          retention-days: 7

  xrce-agent:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Restore cached tarball
        id: tarball
        uses: actions/cache/restore@v5
        with:
          path: /tmp/xrce-dds-agent-arm64.tar.gz
          key: xrce-dds-agent-tarball-${{ env.XRCE_DDS_VERSION }}

      - name: Install build deps
        if: steps.tarball.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake git

      - name: Build Micro XRCE-DDS Agent
        if: steps.tarball.outputs.cache-hit != 'true'
        run: |
          git clone -b ${{ env.XRCE_DDS_VERSION }} --depth 1 \
            https://github.com/eProsima/Micro-XRCE-DDS-Agent.git
          cd Micro-XRCE-DDS-Agent
          mkdir build && cd build
          cmake .. \
            -DCMAKE_INSTALL_PREFIX=/opt/xrce-dds \
            -DCMAKE_BUILD_TYPE=Release \
            -DUAGENT_BUILD_TESTS=OFF
          make -j$(nproc)
          sudo make install

      - name: Package tarball
        if: steps.tarball.outputs.cache-hit != 'true'
        run: tar czf /tmp/xrce-dds-agent-arm64.tar.gz -C / opt/xrce-dds

      - name: Save tarball cache
        if: steps.tarball.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/xrce-dds-agent-arm64.tar.gz
          key: xrce-dds-agent-tarball-${{ env.XRCE_DDS_VERSION }}

      - uses: actions/upload-artifact@v7
        with:
          name: xrce-dds-agent
          path: /tmp/xrce-dds-agent-arm64.tar.gz
          retention-days: 7

  px4-pkgs:
    needs: build-ros-base
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@v6

      - name: Restore cached outputs
        id: pkgs-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            /tmp/ros-jazzy-px4-arm64.tar.gz
            /tmp/px4-single-plan_*.deb
          key: px4-pkgs-outputs-${{ hashFiles('repos/jazzy-pios-trixie.repos', 'scripts/build-ros.sh', 'scripts/install-build-deps.sh', 'src/px4_msgs/**', 'src/px4_single_plan/**', 'scripts/package-deb.sh') }}

      - name: Install build dependencies
        if: steps.pkgs-cache.outputs.cache-hit != 'true'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git python3 python3-pip python3-dev \
            python3-setuptools python3-numpy python3-yaml python3-empy \
            python3-opencv python3-lark \
            libtinyxml2-dev libyaml-cpp-dev libspdlog-dev libssl-dev \
            pkg-config ccache dpkg-dev
          pip3 install --break-system-packages \
            colcon-common-extensions catkin_pkg lark

      - uses: hendrikmuhs/ccache-action@v1.2
        if: steps.pkgs-cache.outputs.cache-hit != 'true'
        with:
          key: px4-pkgs-${{ hashFiles('src/px4_msgs/**', 'src/px4_single_plan/**') }}

      - uses: actions/download-artifact@v8
        if: steps.pkgs-cache.outputs.cache-hit != 'true'
        with:
          name: ros-jazzy-base
          path: /tmp

      - name: Extract ROS 2 base
        if: steps.pkgs-cache.outputs.cache-hit != 'true'
        run: tar xzf /tmp/ros-jazzy-base-pios-arm64.tar.gz -C /

      - name: Build PX4 packages
        if: steps.pkgs-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          mkdir -p /px4_ws/src
          cp -r src/px4_msgs /px4_ws/src/
          cp -r src/px4_single_plan /px4_ws/src/
          cd /px4_ws
          export PATH="/usr/lib/ccache:$PATH"
          colcon build \
            --merge-install \
            --install-base /opt/ros/jazzy \
            --cmake-args \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTING=OFF \
              -DCMAKE_C_COMPILER_LAUNCHER=ccache \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Package tarball
        if: steps.pkgs-cache.outputs.cache-hit != 'true'
        run: tar czf /tmp/ros-jazzy-px4-arm64.tar.gz -C / opt/ros/jazzy

      - name: Package .deb
        if: steps.pkgs-cache.outputs.cache-hit != 'true'
        run: scripts/package-deb.sh /opt/ros/jazzy

      - name: Save outputs cache
        if: steps.pkgs-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            /tmp/ros-jazzy-px4-arm64.tar.gz
            /tmp/px4-single-plan_*.deb
          key: px4-pkgs-outputs-${{ hashFiles('repos/jazzy-pios-trixie.repos', 'scripts/build-ros.sh', 'scripts/install-build-deps.sh', 'src/px4_msgs/**', 'src/px4_single_plan/**', 'scripts/package-deb.sh') }}

      - uses: actions/upload-artifact@v7
        with:
          name: ros-jazzy-px4
          path: /tmp/ros-jazzy-px4-arm64.tar.gz
          retention-days: 7

      - uses: actions/upload-artifact@v7
        with:
          name: px4-single-plan-deb
          path: /tmp/px4-single-plan_*.deb
          retention-days: 30

  assemble-image:
    needs: [build-ros-base, build-xrce-agent, build-px4-pkgs]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y kpartx parted e2fsprogs xz-utils systemd-container wget jq

      - uses: actions/download-artifact@v8
        with:
          name: ros-jazzy-px4
          path: /tmp/artifacts
      - uses: actions/download-artifact@v8
        with:
          name: xrce-dds-agent
          path: /tmp/artifacts

      - name: Resolve Pi OS URL
        id: pios
        run: |
          PIOS_URL=$(wget -qO- "${{ env.PIOS_MANIFEST_URL }}" | jq -r '
            [.. | objects | select(.name? == "Raspberry Pi OS Lite (64-bit)")] | first | .url')
          echo "url=$PIOS_URL" >> "$GITHUB_OUTPUT"
          echo "cache_key=pios-$(echo "$PIOS_URL" | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore Pi OS cache
        id: pios-cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/pios.img.xz
          key: ${{ steps.pios.outputs.cache_key }}

      - name: Download Pi OS image
        if: steps.pios-cache.outputs.cache-hit != 'true'
        run: wget -q -O /tmp/pios.img.xz "${{ steps.pios.outputs.url }}"

      - name: Save Pi OS cache
        if: steps.pios-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /tmp/pios.img.xz
          key: ${{ steps.pios.outputs.cache_key }}

      - name: Build image
        run: sudo scripts/configure-image.sh

      - uses: actions/upload-artifact@v7
        with:
          name: px4-companion-image
          path: /tmp/px4-companion-cm5-*.img.xz
          retention-days: 30
