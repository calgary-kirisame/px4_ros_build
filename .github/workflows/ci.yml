name: Build PX4 Companion Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PIOS_MANIFEST_URL: https://downloads.raspberrypi.com/os_list_imagingutility_v4.json
  XRCE_DDS_VERSION: v2.4.3

jobs:
  build-ros-base:
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: scripts/install-build-deps.sh

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /root/.cache/ccache
          key: ccache-ros-base-${{ hashFiles('repos/jazzy-pios-trixie.repos') }}-${{ github.sha }}
          restore-keys: |
            ccache-ros-base-${{ hashFiles('repos/jazzy-pios-trixie.repos') }}-

      - name: Build ROS 2 Jazzy
        run: scripts/build-ros.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ros-jazzy-base
          path: /tmp/ros-jazzy-base-pios-arm64.tar.gz
          retention-days: 7

  build-xrce-agent:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake git

      - name: Build Micro XRCE-DDS Agent
        run: |
          git clone -b ${{ env.XRCE_DDS_VERSION }} --depth 1 \
            https://github.com/eProsima/Micro-XRCE-DDS-Agent.git
          cd Micro-XRCE-DDS-Agent
          mkdir build && cd build
          cmake .. \
            -DCMAKE_INSTALL_PREFIX=/opt/xrce-dds \
            -DCMAKE_BUILD_TYPE=Release \
            -DUAGENT_BUILD_TESTS=OFF
          make -j$(nproc)
          sudo make install

      - name: Package tarball
        run: tar czf /tmp/xrce-dds-agent-arm64.tar.gz -C / opt/xrce-dds

      - uses: actions/upload-artifact@v4
        with:
          name: xrce-dds-agent
          path: /tmp/xrce-dds-agent-arm64.tar.gz
          retention-days: 7

  build-px4-pkgs:
    needs: build-ros-base
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake git python3 python3-pip python3-dev \
            python3-setuptools python3-numpy python3-yaml python3-empy \
            python3-opencv python3-lark \
            libtinyxml2-dev libyaml-cpp-dev libspdlog-dev libssl-dev \
            pkg-config
          pip3 install --break-system-packages \
            colcon-common-extensions catkin_pkg lark

      - uses: actions/download-artifact@v4
        with:
          name: ros-jazzy-base
          path: /tmp

      - name: Extract ROS 2 base
        run: tar xzf /tmp/ros-jazzy-base-pios-arm64.tar.gz -C /

      - name: Build PX4 packages
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          mkdir -p /px4_ws/src
          cp -r src/px4_msgs /px4_ws/src/
          cp -r src/px4_single_plan /px4_ws/src/
          cd /px4_ws
          colcon build \
            --merge-install \
            --install-base /opt/ros/jazzy \
            --cmake-args \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_TESTING=OFF

      - name: Package tarball
        run: tar czf /tmp/ros-jazzy-px4-arm64.tar.gz -C / opt/ros/jazzy

      - uses: actions/upload-artifact@v4
        with:
          name: ros-jazzy-px4
          path: /tmp/ros-jazzy-px4-arm64.tar.gz
          retention-days: 7

  build-image:
    needs: [build-ros-base, build-xrce-agent, build-px4-pkgs]
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y kpartx parted e2fsprogs xz-utils systemd-container wget jq

      - uses: actions/download-artifact@v4
        with:
          name: ros-jazzy-px4
          path: /tmp/artifacts
      - uses: actions/download-artifact@v4
        with:
          name: xrce-dds-agent
          path: /tmp/artifacts

      - name: Download Pi OS image
        run: |
          PIOS_URL=$(wget -qO- "${{ env.PIOS_MANIFEST_URL }}" | jq -r '
            [.. | objects | select(.name? == "Raspberry Pi OS Lite (64-bit)")] | first | .url')
          echo "Downloading: $PIOS_URL"
          wget -q -O /tmp/pios.img.xz "$PIOS_URL"

      - name: Build image
        run: sudo scripts/configure-image.sh

      - uses: actions/upload-artifact@v4
        with:
          name: px4-companion-image
          path: /tmp/px4-companion-cm5-*.img.xz
          retention-days: 30
